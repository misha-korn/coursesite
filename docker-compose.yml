services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - pg_data:/var/lib/postgresql/data

  redis:
    image: redis:7

  web:
    build: .
    command: python manage.py runserver 0.0.0.0:8000
    volumes: [".:/app"]
    ports: ["8000:8000"]
    env_file: .env
    depends_on: [db, redis]

  celery:
    build: .
    command: celery -A config worker -l info
    volumes: [".:/app"]
    env_file: .env
    depends_on: [db, redis]

  beat:
    build: .
    command: celery -A config beat -l info
    volumes: [".:/app"]
    env_file: .env
    depends_on: [db, redis]

volumes:
  pg_data: